<svg width="1280" height="760" viewBox="0 0 1280 760" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="760" gradientUnits="userSpaceOnUse">
      <stop stop-color="#08111F"/>
      <stop offset="1" stop-color="#0F172A"/>
    </linearGradient>
    <linearGradient id="accent" x1="786" y1="212" x2="1112" y2="512" gradientUnits="userSpaceOnUse">
      <stop stop-color="#7C3AED"/>
      <stop offset="0.55" stop-color="#06B6D4"/>
      <stop offset="1" stop-color="#22C55E"/>
    </linearGradient>
  </defs>
  <rect width="1280" height="760" rx="24" fill="url(#bg)"/>
  <rect x="48" y="48" width="1184" height="664" rx="28" fill="#0B1220" stroke="#1E293B"/>
  <text x="84" y="106" fill="#F8FAFC" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="34" font-weight="700">Runtime architecture</text>
  <text x="84" y="140" fill="#94A3B8" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="18">Hooks trigger a local daemon, which restores a provider-specific browser session and then hides it again when work ends.</text>

  <rect x="84" y="196" width="248" height="160" rx="22" fill="#111827" stroke="#334155"/>
  <text x="112" y="238" fill="#E2E8F0" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="24" font-weight="700">Coding agent</text>
  <text x="112" y="274" fill="#94A3B8" font-family="JetBrains Mono,Consolas,monospace" font-size="14">Claude Code</text>
  <text x="112" y="300" fill="#94A3B8" font-family="JetBrains Mono,Consolas,monospace" font-size="14">Gemini CLI</text>
  <text x="112" y="326" fill="#94A3B8" font-family="JetBrains Mono,Consolas,monospace" font-size="14">Codex</text>

  <rect x="404" y="196" width="292" height="220" rx="22" fill="#111827" stroke="#334155"/>
  <text x="432" y="238" fill="#E2E8F0" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="24" font-weight="700">Hook layer</text>
  <text x="432" y="278" fill="#C4B5FD" font-family="JetBrains Mono,Consolas,monospace" font-size="14">~/.brainrot/hooks/start.sh</text>
  <text x="432" y="304" fill="#94A3B8" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="14">called on agent work start</text>
  <text x="432" y="346" fill="#67E8F9" font-family="JetBrains Mono,Consolas,monospace" font-size="14">~/.brainrot/hooks/stop.sh</text>
  <text x="432" y="372" fill="#94A3B8" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="14">called when the run completes</text>

  <rect x="768" y="196" width="360" height="220" rx="22" fill="#0B1020" stroke="#312E81"/>
  <text x="796" y="238" fill="#F8FAFC" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="24" font-weight="700">Local daemon</text>
  <text x="796" y="276" fill="#E2E8F0" font-family="JetBrains Mono,Consolas,monospace" font-size="14">~/.brainrot/daemon.mjs</text>
  <text x="796" y="304" fill="#94A3B8" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="14">port 9346 · stateful runtime</text>
  <text x="796" y="336" fill="#94A3B8" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="14">restores browser window placement</text>
  <text x="796" y="364" fill="#94A3B8" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="14">manages autoscroll and resume logic</text>
  <rect x="796" y="384" width="300" height="14" rx="7" fill="url(#accent)"/>

  <rect x="84" y="470" width="360" height="176" rx="22" fill="#111827" stroke="#334155"/>
  <text x="112" y="512" fill="#E2E8F0" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="24" font-weight="700">Persistent state</text>
  <text x="112" y="552" fill="#94A3B8" font-family="JetBrains Mono,Consolas,monospace" font-size="14">~/.brainrot/config.json</text>
  <text x="112" y="580" fill="#94A3B8" font-family="JetBrains Mono,Consolas,monospace" font-size="14">~/.brainrot/profiles/provider-*</text>
  <text x="112" y="608" fill="#94A3B8" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="14">provider, mode, position, autoscroll, login/session data</text>

  <rect x="520" y="470" width="608" height="176" rx="22" fill="#09090F" stroke="#27272A"/>
  <text x="548" y="512" fill="#F8FAFC" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="24" font-weight="700">Visual output</text>
  <text x="548" y="550" fill="#E2E8F0" font-family="JetBrains Mono,Consolas,monospace" font-size="14">real providers: TikTok · Instagram · YouTube Shorts · X</text>
  <text x="548" y="578" fill="#E2E8F0" font-family="JetBrains Mono,Consolas,monospace" font-size="14">local preview: ~/.brainrot/browser-feed.html</text>
  <text x="548" y="608" fill="#94A3B8" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="14">browser shown while agent works, then hidden for resume on the next run</text>

  <path d="M332 276H396" stroke="#475569" stroke-width="4" stroke-linecap="round"/>
  <path d="M696 306H760" stroke="#475569" stroke-width="4" stroke-linecap="round"/>
  <path d="M948 420V452" stroke="#475569" stroke-width="4" stroke-linecap="round"/>
  <path d="M444 558H512" stroke="#475569" stroke-width="4" stroke-linecap="round"/>

  <circle cx="364" cy="276" r="8" fill="#7C3AED"/>
  <circle cx="728" cy="306" r="8" fill="#06B6D4"/>
  <circle cx="948" cy="436" r="8" fill="#22C55E"/>
  <circle cx="478" cy="558" r="8" fill="#F59E0B"/>

  <text x="356" y="266" fill="#94A3B8" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="12">start / stop</text>
  <text x="706" y="296" fill="#94A3B8" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="12">launch / restore</text>
  <text x="962" y="440" fill="#94A3B8" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="12">show / hide</text>
  <text x="454" y="548" fill="#94A3B8" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="12">state</text>
</svg>
