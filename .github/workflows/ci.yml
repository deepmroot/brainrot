name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Validate JavaScript syntax
        run: |
          node --check bin/install.js
          node --check bin/lib/settings.js
          node --check src/daemon.mjs

      - name: Validate shell scripts
        run: |
          bash -n install.sh
          bash -n src/hooks/start.sh
          bash -n src/hooks/stop.sh
          bash -n src/hooks/activate-visual.sh
          bash -n src/hooks/deactivate-visual.sh

      - name: Validate PowerShell installer syntax
        shell: pwsh
        run: |
          $errors = $null
          [System.Management.Automation.Language.Parser]::ParseFile((Resolve-Path 'install.ps1'), [ref]$null, [ref]$errors) | Out-Null
          if ($errors.Count -gt 0) {
            $errors | ForEach-Object { Write-Error $_ }
            exit 1
          }

      - name: Run tests
        run: npm test
